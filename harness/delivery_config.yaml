# 交付配置
# 标记 [运行时] 的字段被脚本实际读取（read_config.sh）
# 标记 [参考] 的字段仅供人工/Agent 查阅，由脚本或文档硬编码

# --- [运行时] AI 痕迹扫描关键词 ---
# 消费者：harness/delivery/ai_scan.sh → read_config.sh → config_get_keywords()
ai_scan:
  keywords:
    - Claude
    - ChatGPT
    - GPT-4
    - GPT-3
    - Copilot
    - AI-generated
    - AI生成
    - 语言模型
    - 大模型
    - language model
    - LLM
    - artificial intelligence
    - generated by AI
    - assisted by AI
    - powered by AI
    - Anthropic
    - OpenAI
    - Co-Authored-By
    - noreply@anthropic

# --- [运行时] ZIP 打包排除规则 ---
# 消费者：harness/delivery/package.sh → read_config.sh → config_get_excludes()
packaging:
  exclude_patterns:
    - "*/._*"
    - "*/__MACOSX/*"
    - "*/.DS_Store"
    - "*/.git/*"
    - "*/.Rhistory"
    - "*/.*"

# ============================================================
# [参考] 以下字段由文档/脚本硬编码，此处仅供人工查阅
# ============================================================

# --- [参考] 命名规范 → 见 harness/delivery/standards.md ---
naming:
  language:
    folders: zh_CN
    reports: zh_CN
    scripts: en_US
    figures: en_US
  folder_prefix: "##_"
  figure_prefix: "Fig"
  table_prefix: "Table_S"
  separator: "_"
  forbidden_chars: '\ / : * ? " < > |'

# --- [参考] 图表标准 → 见 AGENTS.md 环境约束 ---
figures:
  background: white
  gridlines: none
  dpi: 300
  formats: [pdf, png]
  font_cn: 黑体
  font_en: "Times New Roman"

# --- [参考] 报告标准 → 见 harness/types/report.md ---
report:
  font_cn_body: 黑体
  font_en: "Times New Roman"
  pvalue_digits: 3
  number_source: programmatic

# --- [参考] 传输 → 见 /transfer skill ---
transfer:
  method: tailscale
  target_os: windows
  target_path: "~/Desktop"
